<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
  <script>
    (function () {
      // Free collector endpoint (webhook.site). Swap this to change destination.
      var ANALYTICS_ENDPOINT = 'https://webhook.site/74ba80db-b322-49b9-bd81-e1a2fcad75e9';

      // Server that emits a real Set-Cookie header (httpbingo.org, a reliable
      // httpbin mirror; cookie is HttpOnly + Secure — a true server-side cookie).
      // /cookies/set?<name>=<value> sets it then 302s to /cookies (JSON of the
      // whole jar), so the landing page is the read-back proving persistence.
      var COOKIE_HOST = 'https://httpbingo.org';

      var params = new URLSearchParams(window.location.search);
      var ts = params.get('ts');
      var uid = params.get('uid');

      var KEY = 'redirect_test_timestamps';

      // 1. Save this timestamp into local storage (persists across launches).
      var entries = [];
      try {
        entries = JSON.parse(localStorage.getItem(KEY)) || [];
      } catch (e) {
        entries = [];
      }
      if (ts) {
        entries.push({ ts: ts, uid: uid, receivedAt: new Date().toISOString() });
        localStorage.setItem(KEY, JSON.stringify(entries));
      }

      // 2. Build the list of UNIQUE uids seen across all history.
      var uniqueUids = [];
      var seen = {};
      entries.forEach(function (e) {
        if (e.uid && !seen[e.uid]) { seen[e.uid] = true; uniqueUids.push(e.uid); }
      });

      // 3. Send an event with the unique uid list to the analytics collector.
      //    sendBeacon queues the request and is guaranteed to be delivered even
      //    though we navigate away on the very next line (a fetch would be cancelled).
      var payload = JSON.stringify({
        event: 'redirect_test',
        origin: window.location.origin,
        current: { ts: ts, uid: uid },
        unique_uids: uniqueUids,
        unique_uid_count: uniqueUids.length,
        total_visits: entries.length,
        sent_at: new Date().toISOString()
      });
      try {
        // text/plain avoids a CORS preflight while still delivering JSON text.
        var blob = new Blob([payload], { type: 'text/plain;charset=UTF-8' });
        navigator.sendBeacon(ANALYTICS_ENDPOINT, blob);
      } catch (e) {}

      // 4. Redirect to the cookie server, setting a cookie NAMED by this app's uid
      //    (so App A and App B set distinctly-named cookies). httpbingo sets it and
      //    lands on /cookies showing the full jar — after both apps you'll see both
      //    cookies accumulate, proving server-set cookies persist across apps in
      //    Safari's shared cookie jar. Runs in <head>, before any paint.
      var cookieName = 'uid_' + (uid || 'unknown');
      var redirectUrl = COOKIE_HOST + '/cookies/set?' +
        encodeURIComponent(cookieName) + '=' + encodeURIComponent(ts || '1');
      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body></body>
</html>
